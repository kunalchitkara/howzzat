name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Check forbidden direct DB imports
        run: bash scripts/check-no-direct-db-imports.sh

      - name: Unit and integration tests
        run: pnpm test:api

      - name: Install Playwright browsers
        run: pnpm --filter @howzzat/web exec playwright install chromium --with-deps

      - name: Smoke page tests (Playwright)
        run: pnpm --filter @howzzat/web exec playwright test e2e/smoke-pages.spec.ts
        env:
          CI: true
